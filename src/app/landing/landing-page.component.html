<main class="landing-page" aria-labelledby="landing-title">
  <article
    class="landing-card"
    (pointermove)="onCardPointerMove($event)"
    (pointerleave)="resetCard($event)"
  >
    <div class="logo-frame">
<img class="logo" src="Images/buenarosa9.JPG" alt="Buena Rosa 9 Homeowners Association logo" />
    </div>

    <p class="eyebrow">Buena Rosa 9 Homeowners Association</p>
    <h1 id="landing-title">A simpler way to stay connected</h1>
    <p class="description">
      View updates, send requests, and manage Buena Rosa 9 community concerns through one
      easy and reliable portal.
    </p>

    <div class="actions">
      <a class="button button-primary" routerLink="/login">Open Portal</a>
      <button class="button button-secondary" type="button">Learn More</button>
    </div>
  </article>
</main>
